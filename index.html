    <style>  
        :root {  
            --bg-color: #f5f5f5;  
            --text-color: #000;  
            --header-color: #497e76;  
            --border-color: #497e76;  
            --filter-bg: #f9f9f9;  
            --practice-bg: #e8f4f8;  
            --universal-bg: #e6f7e6;  
            --superador-bg: #f0e6ff;  
            --details-bg: #f9f9f9;  
            --button-bg: #497e76;  
            --reset-bg: #8c4a4a;  
            --chart-bg: #fff;  
            --chart-text: #000;  
        }  
        body.dark-mode {  
            --bg-color: #1e1e1e;  
            --text-color: #fff;  
            --header-color: #76b8a8;  
            --border-color: #76b8a8;  
            --filter-bg: #2c2c2c;  
            --practice-bg: #3a4f5a;  
            --universal-bg: #2a4d2a;  
            --superador-bg: #4d3a5e;  
            --details-bg: #2c2c2c;  
            --button-bg: #76b8a8;  
            --reset-bg: #b85a5a;  
            --chart-bg: #333;  
            --chart-text: #fff;  
        }  
        body {  
            font-family: Arial, sans-serif; margin:20px; background:var(--bg-color); color:var(--text-color); position: relative; min-height: 100vh; transition: background 0.3s;  
        }  
        h1 { color: var(--header-color); }  
        .filtros-container {   
            margin-bottom: 15px;   
            padding: 12px;   
            border: 1px solid var(--border-color);  
            border-radius: 6px;  
            background: var(--filter-bg);  
        }  
        .filtros-group {  
            flex: 1;  
        }  
        .filtros-group h3 {  
            margin: 0 0 10px 0;  
            color: var(--header-color);  
            font-size: 13px;
        }  
        .filter-columns {   
            display: grid;   
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));   
            gap: 8px;   
            margin-bottom: 10px;
        }  
        .filter-column {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .filter-column label {
            font-size: 10px;
            font-weight: bold;
            color: var(--header-color);
            margin: 0;
        }
        .filter-column select {
            padding: 5px;
            font-size: 10px;
            background: var(--filter-bg);
            color: var(--text-color);
            border: 1px solid #bbb;
            border-radius: 3px;
        }
        .button-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .button-row button {
            padding: 5px 10px;
            font-size: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 70px;
        }
        .button-row button:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .button-row button:active {
            transform: scale(0.95);
        }
        #apply-btn-filters {
            background: #27AE60;
            color: white;
        }
        #apply-btn-filters:hover {
            background: #229954;
        }
        .reset-btn {
            background: #E74C3C !important;
            color: white;
        }
        .reset-btn:hover {
            background: #C0392B !important;
        }
        .button-row label {
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 0;
        }
        .search-container {  
            display: flex;  
            justify-content: center;  
            margin-bottom: 15px;  
            gap: 8px;  
        }  
        .search-container input {  
            padding: 6px;  
            border-radius: 3px;  
            border: 1px solid #bbb;  
            width: 250px; 
            background: var(--filter-bg); 
            color: var(--text-color);  
            font-size: 11px;
        }  
        .search-container button {  
            background: var(--reset-bg);  
            color: white;  
            border: none;  
            padding: 6px 12px;  
            border-radius: 3px;  
            cursor: pointer;  
            font-size: 10px;
        }  
        .search-container button:disabled {  
            background: #cccccc;  
            cursor: not-allowed;  
        }  
        .visitor-counter {  
            position: fixed;  
            bottom: 15px;  
            left: 15px;  
            background: rgba(73, 126, 118, 0.95);  
            color: white;  
            padding: 8px 10px;  
            border-radius: 6px;  
            font-size: 12px;  
            z-index: 1000;  
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);  
            text-align: center;  
            border: 2px solid #3a6159;  
            font-weight: bold;  
            display: flex;  
            align-items: center;  
            gap: 6px;  
        }  
        .visitor-counter img {  
            vertical-align: middle;  
            height: 16px;  
        }  
        .dataTables_filter {  
            display: none !important;  
        }  
        .theme-toggle {  
            position: absolute;  
            top: 20px;  
            right: 20px;  
            background: none;  
            border: none;  
            cursor: pointer;  
            font-size: 24px;  
        }  
        .modal {  
            display: none;  
            position: fixed;  
            z-index: 2000;  
            left: 0;  
            top: 0;  
            width: 100%;  
            height: 100%;  
            overflow: auto;  
            background-color: rgba(0,0,0,0.6);  
        }  
        .modal-content {  
            background: var(--bg-color);  
            margin: 2% auto;  
            padding: 20px;  
            border: 1px solid var(--border-color);  
            width: 95%;  
            max-width: 1100px;  
            border-radius: 6px;  
            position: relative; 
            color: var(--text-color);  
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }  
        .close-btn {  
            position: absolute;  
            top: 10px;  
            right: 15px;  
            font-size: 24px;  
            cursor: pointer;  
            color: var(--text-color);  
            z-index: 10;
        }  
        #stats-summary { margin-bottom: 15px; text-align: center; font-size: 14px; font-weight: bold; }  
        #stats-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 20px; 
            justify-items: center; 
            padding: 10px;
        }  
        #stats-container canvas { 
            max-width: 100%; 
            height: 300px !important;
            background: var(--chart-bg); 
            border-radius: 6px;
            padding: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }  
        table { font-size: 13px; }  
        th, td {   
            text-align: center;   
            padding: 4px 6px !important;   
            height: 24px !important; 
            color: var(--text-color);  
        }  
        .dataTable thead .sorting,   
        .dataTable thead .sorting_asc,   
        .dataTable thead .sorting_desc {  
            background-image: none !important;  
        }  
        .details-child { background: var(--details-bg); padding: 15px; color: var(--text-color); border-top: 2px solid var(--border-color); }  
        .details-child table { width: 100%; border-collapse: collapse; }  
        .details-child th, .details-child td { border: 1px solid var(--border-color); padding: 6px; color: var(--text-color); }  
        .details-child th { background: var(--filter-bg); }  
        .details-child td { background: var(--details-bg); }  
        .practices-container {   
            display: flex;   
            flex-wrap: wrap;   
            gap: 10px;   
        }  
        .practice-type-container {   
            flex: 1 0 250px;   
            background: var(--practice-bg);  
            padding: 8px;   
            border-radius: 4px; 
            color: var(--text-color);  
        }  
        .practice-type-title {   
            font-weight: bold;   
            margin-bottom: 6px;   
            text-align: center;  
            color: var(--header-color);
            font-size: 11px;
        }  
        .practice-list {   
            padding-left: 15px;   
            text-align: left; 
            color: var(--text-color);
            font-size: 10px;
        }  
        .map-container {   
            height: 200px;   
            width: 99%;   
            margin-top:8px;   
            border-radius: 4px;   
            border: 1px solid var(--border-color);  
        }  
        tr.universal { background-color: var(--universal-bg) !important; }  
        tr.superador { background-color: var(--superador-bg) !important; }  
        tr.universal td:first-child { background-color: var(--universal-bg) !important; }  
        tr.superador td:first-child { background-color: var(--superador-bg) !important; }  
        .mode-buttons {  
            display: flex;  
            justify-content: center;  
            gap: 8px;  
            margin-bottom: 15px;  
        }  
        .mode-buttons button {  
            background: var(--button-bg);  
            color: white;  
            border: none;  
            padding: 6px 12px;  
            border-radius: 3px;  
            cursor: pointer;
            font-size: 11px;
        }  
        #general-map {  
            width: 100%;  
            height: 500px;
            border-radius: 6px;  
            border: 1px solid var(--border-color);  
        }  
        .map-legend {  
            margin-top: 12px;  
            font-size: 11px;  
            display: flex;  
            flex-wrap: wrap;  
            gap: 8px;  
            justify-content: center;
        }  
        .map-legend-item {  
            display: flex;  
            align-items: center;  
            gap: 4px;  
        }  
        .legend-color-box {  
            width: 12px;  
            height: 12px;  
            border-radius: 2px;  
            border: 1px solid #555;  
        }
        #contactForm { 
            max-width: 450px; 
            margin: auto; 
            padding: 15px; 
            background-color: var(--bg-color); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
        }
        #contactForm label{ 
            display: block; 
            margin-top: 8px; 
            font-weight: bold;
            font-size: 11px;
        }
        #contactForm input, #contactForm textarea{
            width: 100%; 
            padding: 6px; 
            border: 1px solid #ccc; 
            background-color: #fff;
            border-radius: 3px; 
            box-sizing: border-box; 
            color: #000;
            font-size: 10px;
        }
        #contactForm button{ 
            margin-top: 10px; 
            padding: 6px 12px; 
            background: #497e76; 
            color: #fff; 
            border: none; 
            cursor: pointer; 
            border-radius: 3px;
            font-size: 10px;
        }
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
        }
        .modal-title{ 
            font-size: 1.3rem; 
            margin: 0; 
            color: var(--header-color); 
        }
    </style>  
</head>  
<body>  
    <button class="theme-toggle" id="theme-toggle">☀️</button>  
    <h1>Tabla de Prestadores Médicos</h1>  

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar...">
        <button id="clear-search-btn">Limpiar búsqueda</button>

    <div class="visitor-counter" id="visitor-counter">

    <!-- MODAL ESTADÍSTICAS -->

                    Mostrar Prestadores Asociados
                </label>
                <button id="update-map-btn" style="padding: 5px 10px; font-size: 10px; background: #27AE60; color: white; border: none; border-radius: 3px; cursor: pointer;">Actualizar Mapa</button>
            </div>
            <div id="general-map"></div>
            <div class="map-legend">
                <div class="map-legend-item"><div class="legend-color-box" style="background:#E74C3C;"></div> Clínicas y Sanatorios</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#B5E6A2;"></div> Diagnóstico y Tratamiento</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#27AE60;"></div> Rehabilitación</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#F1C40F;"></div> Centros Médicos</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#E67E22;"></div> Especialistas</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#3498DB;"></div> Pediatría</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#9B59B6;"></div> Salud Mental</div>
                <div class="map-legend-item"><div class="legend-color-box" style="background:#afb3b0;"></div> Varios</div>

    <div style="text-align:center; margin-top:20px;">
        <button id="openContactBtn" style="padding: 8px 16px; background: #497e76; color: white; border: 2px solid #3a6159; border-radius: 4px; font-size: 11px; cursor: pointer;">
            Ingresar Reclamo
        </button>
    </div>

    <!-- MODAL CONTACTO -->
    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Contáctanos</h2>
                <span class="close-btn" id="close-contact">&times;</span>
            </div>
            <form id="contactForm">
                <label>Nombre: <input type="text" name="name" required /></label>
                <label>Email: <input type="email" name="email" required /></label>
                <label>Mensaje: <textarea name="message" rows="4" required></textarea></label>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

<script>
// ============================================================
// MODO OSCURO
// ============================================================
const themeToggle = document.getElementById('theme-toggle');
const body = document.body;
const currentTheme = localStorage.getItem('theme') || 'light';

if (currentTheme === 'dark') {
    body.classList.add('dark-mode');
    themeToggle.innerHTML = '🌙';
} else {
    themeToggle.innerHTML = '☀️';
}

let tabla;
let seccionalChart, planChart, clasificacionChart;

themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    const isDark = body.classList.contains('dark-mode');
    themeToggle.innerHTML = isDark ? '🌙' : '☀️';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');

    if (seccionalChart) seccionalChart.update();
    if (planChart) planChart.update();
    if (clasificacionChart) clasificacionChart.update();
});

$(function() {  
    let providersCompact = [], datosFiltrados = [];  
    let uniqueClasificaciones = new Set();  
    let uniquePlans = new Set();
    let selectedFilters = {
        seccional: [],

    // ============================================================

    function createFilterSelect(label, items, filterId) {
        const col = document.createElement('div');
        col.className = 'filter-column';
        
        const labelEl = document.createElement('label');
        labelEl.textContent = label;
        
        const select = document.createElement('select');
        select.id = filterId;
        select.multiple = true;
        select.size = 4;
        
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '--- Ninguno ---';
        select.appendChild(option);
        
        const sortedItems = Array.from(items).sort();
        sortedItems.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            opt.textContent = item;
            select.appendChild(opt);
        });
        
        col.appendChild(labelEl);
        col.appendChild(select);
        return col;
    }

    Papa.parse("Data_geocoded.csv", {  
        download: true,  
        header: true,  
        delimiter: ";",  
        complete: function(results) {  

            datosFiltrados = results.data.filter(row => {
                return row.CUIT && row.CUIT.trim() !== "" &&
                    !(row['Clasificacion prestador'] === 'Clinicas y Sanatorios' &&
                        row['Tipo de prestador'] === 'DiagnosticoyTratamiento');
            });

            const providersMap = {};  

            datosFiltrados.forEach(row => {  
                const key = `${row.CUIT}-${row.Domicilio}`;  
                if (!providersMap[key]) {  
                    providersMap[key] = {  
                        CUIT: row.CUIT,  
                        Nombre: row.Nombre,  
                        NroPrestador: row.NroPrestador,  
                        Seccional: row.Seccional,  
                        Provincia: row.Provincia,  
                        Partido: row.Partido,  
                        Localidad: row.Localidad,  
                        Domicilio: row.Domicilio,  
                        Telefono: row.Telefono,  
                        Clasificacion: row['Clasificacion prestador'],  
                        Plan: new Set(),  
                        practices: [],
                        lat: row.lat ? parseFloat(String(row.lat).replace(",", ".")) : null,
                        lon: row.lon ? parseFloat(String(row.lon).replace(",", ".")) : null
                    };  
                    if (row['Clasificacion prestador']) {  
                        uniqueClasificaciones.add(row['Clasificacion prestador']);  
                    }  
                }  
                if (row.Plan) {  
                    providersMap[key].Plan.add(row.Plan);  
                    uniquePlans.add(row.Plan);  
                }  
                providersMap[key].practices.push({  
                    tipo: row['Tipo de prestador'],  
                    especialidad: row['Especialidad']  
                });  
            });  

            Object.keys(providersMap).forEach(key => {  
                const planStr = Array.from(providersMap[key].Plan).join(', ');  
                providersMap[key].Plan = planStr;  
            });  
            providersCompact = Object.values(providersMap);  

            providersCompact.sort((a, b) => {  
                const aIsUniversal = a.Plan.includes('Universal');  
                const bIsUniversal = b.Plan.includes('Universal');  
                const aIsSuperador = a.Plan.includes('Superador');  
                const bIsSuperador = b.Plan.includes('Superador');  

                if (aIsUniversal && !bIsUniversal) return -1;  
                if (!aIsUniversal && bIsUniversal) return 1;  
                if (aIsSuperador && !bIsSuperador) return 1;  
                if (!aIsSuperador && bIsSuperador) return -1;  
                return a.Nombre.localeCompare(b.Nombre);  
            });

            // Renderizar filtros
            const filterContainer = document.getElementById('all-filters');
            filterContainer.appendChild(createFilterSelect('Seccional', seccionales, 'select-seccional'));
            filterContainer.appendChild(createFilterSelect('Plan', Array.from(uniquePlans), 'select-plan'));
            filterContainer.appendChild(createFilterSelect('Clasificación', Array.from(uniqueClasificaciones), 'select-clasificacion'));
            
            const tiposGuardia = Object.keys(tipoEspecialidad).filter(t => t.includes('Guardia'));
            filterContainer.appendChild(createFilterSelect('Guardia', tiposGuardia, 'select-guardia'));
            
            const tiposNoGuardia = Object.keys(tipoEspecialidad).filter(t => !t.includes('Guardia'));
            filterContainer.appendChild(createFilterSelect('Tipo de Prestador', tiposNoGuardia, 'select-tipo'));
            filterContainer.appendChild(createFilterSelect('Especialidad', [], 'select-especialidad'));

            // Inicializar tabla
            tabla = $('#tabla-prestadores').DataTable({  
                data: providersCompact.filter(provider => {
                    return !(provider.Clasificacion === 'Clinicas y Sanatorios' &&
                            provider.practices.some(p => p.tipo === 'DiagnosticoyTratamiento'));
                }),  
                columns: [  
                    {data: null, defaultContent: '<button class="details-control">+</button>', orderable: false },  
                    {data: 'Nombre', defaultContent: '' },  
                    {data: 'NroPrestador', defaultContent: '' },  
                    {data: 'Seccional', defaultContent: '' },  
                    {data: 'Localidad', defaultContent: '' },  
                    {data: 'Plan', defaultContent: '' }  
                ],  
                language: {url: 'https://cdn.datatables.net/plug-ins/1.11.5/i18n/es-ES.json'},  
                pageLength: 25,  
                ordering: false,  
                searching: true,  
                dom: 'Bfrtip',  
                buttons: [  
                    { extend: 'copyHtml5', title: 'Prestadores Médicos' },  
                    { extend: 'excelHtml5', title: 'Prestadores Médicos' },  
                    { extend: 'csvHtml5', title: 'Prestadores Médicos' },  
                    { extend: 'pdfHtml5', title: 'Prestadores Médicos' }  
                ],  
                createdRow: function(row, data) {  
                    if (data.Plan.includes('Universal')) {  
                        $(row).addClass('universal');  
                    } else if (data.Plan.includes('Superador')) {  
                        $(row).addClass('superador');  
                    }  
                }  
            });  

            // Eventos de filtros
            function applyFilters() {
                selectedFilters = {
                    seccional: Array.from(document.getElementById('select-seccional').selectedOptions).map(o => o.value),
                    plan: Array.from(document.getElementById('select-plan').selectedOptions).map(o => o.value),
                    clasificacion: Array.from(document.getElementById('select-clasificacion').selectedOptions).map(o => o.value),
                    guardia: Array.from(document.getElementById('select-guardia').selectedOptions).map(o => o.value),
                    tipo: Array.from(document.getElementById('select-tipo').selectedOptions).map(o => o.value),
                    especialidad: Array.from(document.getElementById('select-especialidad').selectedOptions).map(o => o.value)
                };

                const mostrarAsociados = document.getElementById('mostrar-asociados').checked;

                const filteredData = providersCompact.filter(provider => {
                    if (provider.Clasificacion === 'Clinicas y Sanatorios' &&
                        provider.practices.some(p => p.tipo === 'DiagnosticoyTratamiento')) {
                        return false;
                    }

                    if (!mostrarAsociados && provider.NroPrestador.includes('-')) {
                        return false;
                    }

                    if (selectedFilters.seccional.length > 0 && !selectedFilters.seccional.includes(provider.Seccional)) {
                        return false;
                    }

                    if (selectedFilters.plan.length > 0 && !selectedFilters.plan.some(p => provider.Plan.includes(p))) {
                        return false;
                    }

                    if (selectedFilters.clasificacion.length > 0 && !selectedFilters.clasificacion.includes(provider.Clasificacion)) {
                        return false;
                    }

                    const tipos = [...selectedFilters.guardia, ...selectedFilters.tipo];
                    if (tipos.length > 0) {
                        const hasPractice = provider.practices.some(p => tipos.includes(p.tipo));
                        if (!hasPractice) return false;
                    }

                    if (selectedFilters.especialidad.length > 0) {
                        const hasEspecialidad = provider.practices.some(p => selectedFilters.especialidad.includes(p.especialidad));
                        if (!hasEspecialidad) return false;
                    }

                    return true;
                });

                tabla.clear().rows.add(filteredData).draw();
                updateEspecialidadOptions();
            }

            function updateEspecialidadOptions() {
                const tiposSeleccionados = [
                    ...Array.from(document.getElementById('select-guardia').selectedOptions).map(o => o.value),
                    ...Array.from(document.getElementById('select-tipo').selectedOptions).map(o => o.value)
                ];

                const selectEspecialidad = document.getElementById('select-especialidad');
                const currentValues = Array.from(selectEspecialidad.selectedOptions).map(o => o.value);

                if (tiposSeleccionados.length !== 1) {
                    selectEspecialidad.innerHTML = '<option value="">--- Ninguno ---</option><option disabled>Selecciona un solo Tipo</option>';
                } else {
                    const tipoSeleccionado = tiposSeleccionados[0];
                    const especialidades = tipoEspecialidad[tipoSeleccionado] || [];
                    
                    selectEspecialidad.innerHTML = '<option value="">--- Ninguno ---</option>';
                    especialidades.sort().forEach(esp => {
                        const opt = document.createElement('option');
                        opt.value = esp;
                        opt.textContent = esp;
                        selectEspecialidad.appendChild(opt);
                    });

                    Array.from(currentValues).forEach(val => {
                        if (val && especialidades.includes(val)) {
                            const opt = selectEspecialidad.querySelector(`option[value="${val}"]`);
                            if (opt) opt.selected = true;
                        }
                    });
                }
            }

            document.getElementById('apply-btn-filters').addEventListener('click', applyFilters);
            document.getElementById('clear-all-btn-filters').addEventListener('click', () => {
                document.getElementById('select-seccional').selectedIndex = -1;
                document.getElementById('select-plan').selectedIndex = -1;
                document.getElementById('select-clasificacion').selectedIndex = -1;
                document.getElementById('select-guardia').selectedIndex = -1;
                document.getElementById('select-tipo').selectedIndex = -1;
                document.getElementById('select-especialidad').selectedIndex = -1;
                document.getElementById('mostrar-asociados').checked = true;
                applyFilters();
            });

            document.getElementById('select-guardia').addEventListener('change', updateEspecialidadOptions);
            document.getElementById('select-tipo').addEventListener('change', updateEspecialidadOptions);

            $('#search-input').on('keyup', function() {
                tabla.search(this.value).draw();
            });

            document.getElementById('clear-search-btn').addEventListener('click', function() {
                document.getElementById('search-input').value = '';
                tabla.search('').draw();
            });

            // Detalles de filas
            $('#tabla-prestadores tbody').on('click', 'button.details-control', function () {  
                const tr = $(this).closest('tr');  
                const row = tabla.row(tr);  
                const rowData = row.data();  

                if (row.child.isShown()) {  
                    row.child.hide();  
                    tr.removeClass('shown');  
                    $(this).text('+');  
                } else {  
                    $(this).text('-');  
                    const practicesByType = {};  

                    rowData.practices.forEach(practice => {  
                        if(!(rowData.Clasificacion === 'Clinicas y Sanatorios' && practice.tipo === 'DiagnosticoyTratamiento')){  
                            if (!practicesByType[practice.tipo]) {  
                                practicesByType[practice.tipo] = [];  
                            }  
                            practicesByType[practice.tipo].push(practice.especialidad);   
                        }   
                    });  

                    let practicesHtml = '<div class="practices-container">';  
                    Object.keys(practicesByType).forEach(tipo => {  
                        practicesHtml += `  
                        <div class="practice-type-container">  
                            <div class="practice-type-title">${tipo}</div>  
                            <ul class="practice-list">`;  
                        practicesByType[tipo].forEach(especialidad => {  
                            practicesHtml += `<li>${especialidad}</li>`;  
                        });  
                        practicesHtml += `  
                            </ul>  
                        </div>`;  
                    });  
                    practicesHtml += '</div>';  

                    const mapId = `mapa-${(rowData.CUIT).replace(/\W/g,'')}-${(rowData.Domicilio).replace(/\W/g,'')}`;  
                    let detalleHtml = `  
                    <div class="details-child">  
                        <table class="details-table">  
                            <tr><th>Provincia:</th><td>${rowData.Provincia||'N/A'}</td></tr>  
                            <tr><th>Partido:</th><td>${rowData.Partido||'N/A'}</td></tr>  
                            <tr><th>Localidad:</th><td>${rowData.Localidad||'N/A'}</td></tr>  
                            <tr><th>Domicilio:</th><td>${rowData.Domicilio||'N/A'}</td></tr>  
                            <tr><th>Telefono:</th><td>${rowData.Telefono||'N/A'}</td></tr>  
                            <tr><th>Clasificación:</th><td>${rowData.Clasificacion||'N/A'}</td></tr>  
                            <tr><th>Prácticas:</th><td>${practicesHtml}</td></tr>  
                            <tr><th>Ubicación:</th>  
                                <td>  
                                    <div id="${mapId}" class="map-container"></div>  
                                </td>  
                            </tr>  
                        </table>  
                    </div>`;  
                    row.child(detalleHtml).show();  
                    tr.addClass('shown');  

                    const hasCoords = rowData.lat != null && rowData.lon != null && !isNaN(rowData.lat) && !isNaN(rowData.lon);

                    if (hasCoords) {
                        const map = L.map(mapId).setView([rowData.lat, rowData.lon], 16);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: 'OpenStreetMap'}).addTo(map);
                        const address = [rowData.Domicilio, rowData.Localidad, rowData.Partido, rowData.Provincia].filter(Boolean).join(", ");
                        L.marker([rowData.lat, rowData.lon]).addTo(map).bindPopup(address).openPopup();
                    } else {
                        document.getElementById(mapId).innerHTML = "<div style='color:#b71c1c;padding:20px;text-align:center;'>Sin coordenadas.</div>";
                    }
                }  
            });

            // Estadísticas
            const statsModal = document.getElementById('stats-modal');  
            const statsBtn = document.getElementById('stats-btn');  
            const closeStats = document.getElementById('close-stats');  

            statsBtn.onclick = function() {  
                statsModal.style.display = 'block';  
                const filteredData = tabla.rows({search: 'applied'}).data().toArray();  
                const isDark = body.classList.contains('dark-mode');  

                const totalPrestadores = filteredData.length;  
                const universalCount = filteredData.filter(p => p.Plan.includes('Universal')).length;  
                const superadorCount = filteredData.filter(p => p.Plan.includes('Superador')).length;  
                const seccionalCount = {};  
                filteredData.forEach(p => seccionalCount[p.Seccional] = (seccionalCount[p.Seccional] || 0) + 1);  
                const topSeccional = Object.entries(seccionalCount).sort((a, b) => b[1] - a[1])[0] || ['N/A', 0];  
                document.getElementById('stats-summary').innerHTML = `  
                    Total: ${totalPrestadores} | Universal: ${universalCount} | Superador: ${superadorCount} | Top: ${topSeccional[0]} (${topSeccional[1]})
                `;  

                const seccionalLabels = Object.keys(seccionalCount);  
                const seccionalData = Object.values(seccionalCount);  
                const chartTextColor = isDark ? '#fff' : '#000';  

                if (!seccionalChart) {  
                    seccionalChart = new Chart(document.getElementById('seccional-chart'), {  
                        type: 'bar',  
                        data: { labels: seccionalLabels, datasets: [{ label: 'Prestadores', data: seccionalData, backgroundColor: isDark ? '#76b8a8' : '#497e76' }] },  
                        options: { scales: { y: { beginAtZero: true, ticks: { color: chartTextColor } }, x: { ticks: { color: chartTextColor } } }, plugins: { legend: { labels: { color: chartTextColor } } } }  
                    });  
                } else {  
                    seccionalChart.data.labels = seccionalLabels;  
                    seccionalChart.data.datasets[0].data = seccionalData;  
                    seccionalChart.update();  
                }  

                const planCount = { Universal: universalCount, Superador: superadorCount };  

                if (!planChart) {  
                    planChart = new Chart(document.getElementById('plan-chart'), {  
                        type: 'pie',  
                        data: { labels: ['Universal', 'Superador'], datasets: [{ data: [planCount.Universal, planCount.Superador], backgroundColor: isDark ? ['#3a6159', '#5e3a4d'] : ['#e6f7e6', '#f0e6ff'] }] },  
                        options: { plugins: { legend: { labels: { color: chartTextColor } } } }  
                    });  
                } else {  
                    planChart.data.datasets[0].data = [planCount.Universal, planCount.Superador];  
                    planChart.update();  
                }  

                const clasificacionCount = {};  
                filteredData.forEach(provider => {  
                    clasificacionCount[provider.Clasificacion] = (clasificacionCount[provider.Clasificacion] || 0) + 1;  
                });  
                const sortedClasif = Object.entries(clasificacionCount).sort((a, b) => b[1] - a[1]).slice(0, 5);  
                const clasifLabels = sortedClasif.map(([key]) => key);  
                const clasifData = sortedClasif.map(([, value]) => value);  

                if (!clasificacionChart) {  
                    clasificacionChart = new Chart(document.getElementById('clasificacion-chart'), {  
                        type: 'bar',  
                        data: { labels: clasifLabels, datasets: [{ label: 'Top 5', data: clasifData, backgroundColor: isDark ? '#b85a5a' : '#8c4a4a' }] },  
                        options: { scales: { y: { beginAtZero: true, ticks: { color: chartTextColor } }, x: { ticks: { color: chartTextColor } } }, plugins: { legend: { labels: { color: chartTextColor } } } }  
                    });  
                } else {  
                    clasificacionChart.data.labels = clasifLabels;  
                    clasificacionChart.data.datasets[0].data = clasifData;  
                    clasificacionChart.update();  
                }  
            };  

            closeStats.onclick = function() {  
                statsModal.style.display = 'none';  
            };

            // Mapa General
            const mapModal = document.getElementById('map-modal');
            const mapBtn = document.getElementById('map-btn');
            const closeMap = document.getElementById('close-map');
            let generalMap = null;
            let generalMarkersLayer = null;

            function getColorByClasificacion(clasif) {
                if (!clasif) return '#666666';
                const c = clasif.toLowerCase();
                if (c.includes('clinicas') || c.includes('sanatorio')) return '#E74C3C';
                if (c.includes('diagnostico')) return '#B5E6A2';
                if (c.includes('rehabil')) return '#27AE60';
                if (c.includes('centr')) return '#F1C40F';
                if (c.includes('pedia')) return '#3498DB';
                if (c.includes('especial')) return '#E67E22';
                if (c.includes('salud')) return '#9B59B6';
                return '#afb3b0';
            }

            function createColoredIcon(color) {
                return L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid #ffffff;box-shadow:0 0 4px rgba(0,0,0,0.6);"></div>`,
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });
            }

            function buildGeneralMap() {
                const rows = tabla.rows({search:'applied'}).data().toArray();
                const mostrarAsociados = document.getElementById('mostrar-asociados-mapa').checked;

                if (!generalMap) {
                    generalMap = L.map('general-map').setView([-34.6, -58.4], 4);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: 'OpenStreetMap'}).addTo(generalMap);
                }

                if (generalMarkersLayer) {
                    generalMap.removeLayer(generalMarkersLayer);
                }
                generalMarkersLayer = L.layerGroup().addTo(generalMap);

                const bounds = [];

                for (const provider of rows) {
                    if (!mostrarAsociados && provider.NroPrestador.includes('-')) continue;

                    const lat = provider.lat;
                    const lon = provider.lon;

                    if (lat == null || lon == null || isNaN(lat) || isNaN(lon)) continue;

                    const color = getColorByClasificacion(provider.Clasificacion);
                    const icon = createColoredIcon(color);

                    const popupHtml = `
                        <strong>${provider.Nombre || ''}</strong><br>
                        NroPrestador: ${provider.NroPrestador || 'N/A'}<br>
                        Clasificación: ${provider.Clasificacion || 'N/A'}<br>
                        Seccional: ${provider.Seccional || 'N/A'}<br>
                        Localidad: ${provider.Localidad || 'N/A'}<br>
                        Domicilio: ${provider.Domicilio || 'N/A'}<br>
                        Teléfono: ${provider.Telefono || 'N/A'}
                    `;

                    const marker = L.marker([lat, lon], { icon }).bindPopup(popupHtml);
                    marker.addTo(generalMarkersLayer);
                    bounds.push([lat, lon]);
                }

                if (bounds.length > 0) {
                    generalMap.fitBounds(bounds, { padding: [20, 20] });
                }
            }

            mapBtn.onclick = function() {
                mapModal.style.display = 'block';
                setTimeout(() => {
                    buildGeneralMap();
                    if (generalMap) generalMap.invalidateSize();
                }, 150);
            };

            closeMap.onclick = function() {
                mapModal.style.display = 'none';
            };

            document.getElementById('update-map-btn').addEventListener('click', buildGeneralMap);

            window.onclick = function(event) {  
                if (event.target == statsModal) statsModal.style.display = 'none';  
                if (event.target == mapModal) mapModal.style.display = 'none';  
            };
        }  
    });  
});

const serviceID = 'service_bpql0t2';
const templateID = 'template_pvy0uye';
const publicKey = 'gGaNST8Xed0QDePFj';

emailjs.init(publicKey);

function sendEmail(data) {
  const params = {
    name: data.name,
    contact_email: data.email,
    message: data.message,
    time: new Date().toLocaleString()
  };

  emailjs.send(serviceID, templateID, params)
    .then((response) => {
      alert('¡Mensaje enviado! Gracias por contactarnos.');
      closeModal();
    })
    .catch((err) => {
      console.error('Error:', err);
      alert('Hubo un problema. Inténtalo de nuevo.');
    });
}

const contactModal = document.getElementById('contact-modal');

function openModal() { contactModal.style.display = 'flex'; }
function closeModal() { contactModal.style.display = 'none'; }

document.getElementById('openContactBtn').addEventListener('click', openModal);
document.querySelector('#contact-modal .close-btn').addEventListener('click', closeModal);

window.addEventListener('click', (e) => {
  if (e.target === contactModal) closeModal();
});

document.getElementById('contactForm').addEventListener('submit', function(e){
  e.preventDefault();
  const formData = new FormData(this);
  const dataObj = Object.fromEntries(formData.entries());
  sendEmail(dataObj);
});
